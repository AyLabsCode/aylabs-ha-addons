name: Auto-update Bonap version

on:
  schedule:
    - cron: "0 6 * * *"  # every day at 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get latest Bonap release
        id: bonap
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/AymericLeFeyer/bonap/releases/latest)
          LATEST=$(echo "$RELEASE" | jq -r '.tag_name')
          LATEST="${LATEST#v}"
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current
        run: |
          CURRENT=$(grep '^version:' bonap/config.yaml | tr -d '"' | awk '{print $2}')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        id: changelog
        if: steps.bonap.outputs.version != steps.current.outputs.version
        run: |
          PREV="v${{ steps.current.outputs.version }}"
          NEXT="v${{ steps.bonap.outputs.version }}"

          COMMITS=$(curl -s "https://api.github.com/repos/AymericLeFeyer/bonap/compare/${PREV}...${NEXT}" \
            | jq -r '.commits[].commit.message')

          FEATURES=""
          FIXES=""

          while IFS= read -r line; do
            MSG=$(echo "$line" | head -1)
            if echo "$MSG" | grep -qE '^\[skip ci\]|^\s*$'; then
              continue
            fi
            if echo "$MSG" | grep -qE '^feat(\(.+\))?(\!)?:'; then
              DESC=$(echo "$MSG" | sed -E 's/^feat(\([^)]*\))?(\!)?:\s*//')
              FEATURES="${FEATURES}- ${DESC}\n"
            elif echo "$MSG" | grep -qE '^fix(\(.+\))?(\!)?:'; then
              DESC=$(echo "$MSG" | sed -E 's/^fix(\([^)]*\))?(\!)?:\s*//')
              FIXES="${FIXES}- ${DESC}\n"
            fi
          done <<< "$COMMITS"

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}### Nouveautés\n\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Corrections\n\n${FIXES}\n"
          fi

          echo "body<<EOF" >> $GITHUB_OUTPUT
          printf "%b" "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update config.yaml and CHANGELOG.md if new version
        if: steps.bonap.outputs.version != steps.current.outputs.version
        run: |
          VERSION="${{ steps.bonap.outputs.version }}"
          sed -i "s/^version: \"[0-9.]*\"/version: \"${VERSION}\"/" bonap/config.yaml
          CHANGELOG="bonap/CHANGELOG.md"
          touch "$CHANGELOG"
          echo -e "## ${VERSION}\n\n${{ steps.changelog.outputs.body }}\n" | cat - "$CHANGELOG" > /tmp/changelog.md
          mv /tmp/changelog.md "$CHANGELOG"

      - name: Commit and push
        if: steps.bonap.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bonap/config.yaml bonap/CHANGELOG.md
          git commit -m "chore: update Bonap to ${{ steps.bonap.outputs.version }}"
          git push
