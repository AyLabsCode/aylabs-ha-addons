name: Auto-update Bonap TRMNL version

on:
  schedule:
    - cron: "0 7 * * *"  # every day at 7am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get latest BFF release
        id: bff
        run: |
          VERSION=$(git ls-remote --tags https://github.com/AymericLeFeyer/bonap 'refs/tags/bff-v*' \
            | awk '{print $2}' | sed 's|refs/tags/bff-v||' | sort -V | tail -1)
          if [ -z "$VERSION" ]; then
            echo "Aucune release bff-v trouvée, abandon."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current
        run: |
          CURRENT=$(grep '^version:' bonap-trmnl/config.yaml | tr -d '"' | awk '{print $2}')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update config.yaml and CHANGELOG.md if new version
        if: steps.bff.outputs.version != steps.current.outputs.version
        run: |
          VERSION="${{ steps.bff.outputs.version }}"
          sed -i "s/^version: \"[0-9.]*\"/version: \"${VERSION}\"/" bonap-trmnl/config.yaml
          CHANGELOG="bonap-trmnl/CHANGELOG.md"
          touch "$CHANGELOG"
          printf "## %s\n\n" "$VERSION" | cat - "$CHANGELOG" > /tmp/changelog.md
          mv /tmp/changelog.md "$CHANGELOG"

      - name: Commit and push
        if: steps.bff.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bonap-trmnl/config.yaml bonap-trmnl/CHANGELOG.md
          git commit -m "chore: update Bonap TRMNL to ${{ steps.bff.outputs.version }}"
          git push
