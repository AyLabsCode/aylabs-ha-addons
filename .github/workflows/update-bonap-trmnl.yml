name: Auto-update Bonap TRMNL version

on:
  schedule:
    - cron: "0 7 * * *"  # every day at 7am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get latest BFF release
        id: bff
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/AymericLeFeyer/bonap/releases \
            | jq '[.[] | select(.tag_name | startswith("bff-v"))][0]')
          VERSION=$(echo "$RELEASE" | jq -r '.tag_name // empty' | sed 's/^bff-v//')
          if [ -z "$VERSION" ]; then
            echo "Aucune release bff-v trouvée, abandon."
            exit 1
          fi
          BODY=$(echo "$RELEASE" | jq -r '.body // ""')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current
        run: |
          CURRENT=$(grep '^version:' bonap-trmnl/config.yaml | tr -d '"' | awk '{print $2}')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update config.yaml and CHANGELOG.md if new version
        if: steps.bff.outputs.version != steps.current.outputs.version
        env:
          CHANGELOG_BODY: ${{ steps.bff.outputs.body }}
        run: |
          VERSION="${{ steps.bff.outputs.version }}"
          sed -i "s/^version: \"[0-9.]*\"/version: \"${VERSION}\"/" bonap-trmnl/config.yaml
          CHANGELOG="bonap-trmnl/CHANGELOG.md"
          touch "$CHANGELOG"
          printf "## %s\n\n%s\n\n" "$VERSION" "$CHANGELOG_BODY" | cat - "$CHANGELOG" > /tmp/changelog.md
          mv /tmp/changelog.md "$CHANGELOG"

      - name: Commit and push
        if: steps.bff.outputs.version != steps.current.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bonap-trmnl/config.yaml bonap-trmnl/CHANGELOG.md
          git commit -m "chore: update Bonap TRMNL to ${{ steps.bff.outputs.version }}"
          git push
